# =============================================================================
# Kalyan Auth — frontend (static SPA) — production nginx
# =============================================================================
# Backend auth is Frappe + Keycloak; this only serves the Vite build (dist/).
#
# ON THE BUILD MACHINE (or CI):
#   1. Create .env with all VITE_* values for production URLs.
#   2. npm ci && npm run build
#   3. Copy ./dist/* to the VM, e.g. /var/www/kalyan-auth/html/
#
# ON THE VM:
#   1. apt install nginx   (or your distro equivalent)
#   2. Adjust root and server_name below; symlink into sites-enabled if needed.
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# TLS: use certbot, or terminate SSL on a reverse proxy and proxy_pass to :80.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name auth.example.com;   # <-- your public hostname

    root /var/www/kalyan-auth/html;  # <-- path where dist/ contents were copied
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # SPA: every path serves index.html unless a real file exists
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite hashed assets — safe to cache long term
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don’t cache the HTML shell (new deploys take effect quickly)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
}
